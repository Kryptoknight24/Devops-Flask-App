<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System | Authentication</title>
    <style>
        body {
            background-color: #05050b;
            color: #00e5ff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { text-align: center; }
        #app { margin-top: 30px; display: flex; justify-content: center; }

        /* Remember Me Prompt */
        #remember-prompt {
            display: none;
            margin-top: 30px;
        }
        #remember-prompt p {
            font-size: 16px;
            margin-bottom: 20px;
            color: #88c0d0;
        }
        .prompt-btn {
            padding: 10px 25px;
            margin: 0 10px;
            border: 1px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .prompt-btn:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            text-shadow: 0 0 5px #00e5ff;
        }
        .prompt-btn.skip {
            border-color: #555;
            color: #888;
        }
        .prompt-btn.skip:hover {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
            color: #aaa;
        }

        /* Preloader Animation */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 4vw 6vw;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
            pointer-events: none;
        }

        .preloader-words {
            display: flex;
            gap: 1.5rem;
        }

        .word-mask {
            overflow: hidden;
            display: inline-block;
        }

        .preloader-text {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 4rem;
            font-weight: 800;
            color: #f4f4f4;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            transform: translateY(100%);
            animation: slideUpReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .word-mask:nth-child(1) .preloader-text {
            animation-delay: 0.1s;
        }

        .word-mask:nth-child(2) .preloader-text {
            animation-delay: 0.2s;
        }

        @keyframes slideUpReveal {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }

        #preloader.slide-up {
            transform: translateY(-100%);
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="preloader-words">
            <div class="word-mask">
                <div class="preloader-text">Project</div>
            </div>
            <div class="word-mask">
                <div class="preloader-text">ARISE</div>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>SYSTEM INITIALIZATION</h2>
        <p>Awaiting Player Authentication...</p>
        <div id="app"></div>

        <div id="remember-prompt">
            <p>⏻ Remember this device?</p>
            <button class="prompt-btn" onclick="rememberAndEnter()">Yes, Remember Me</button>
            <button class="prompt-btn skip" onclick="skipAndEnter()">No, Just This Once</button>
        </div>
    </div>

    <script 
        async
        crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_ZXBpYy1naXJhZmZlLTMyLmNsZXJrLmFjY291bnRzLmRldiQ" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js">
    </script>

    <script>
        async function enterSystem() {
            const token = await window.Clerk.session.getToken();
            document.cookie = "__session=" + token + "; path=/;";
            window.location.href = '/status';
        }

        function rememberAndEnter() {
            localStorage.setItem('rememberMe', 'true');
            sessionStorage.removeItem('pendingLogin');
            enterSystem();
        }

        function skipAndEnter() {
            sessionStorage.removeItem('pendingLogin');
            enterSystem();
        }

        function showSignIn(appDiv) {
            sessionStorage.setItem('pendingLogin', 'true');
            window.Clerk.mountSignIn(appDiv);
        }

        window.addEventListener('load', async function () {
            await window.Clerk.load();
            const appDiv = document.getElementById('app');
            const rememberPrompt = document.getElementById('remember-prompt');
            const isRemembered = localStorage.getItem('rememberMe') === 'true';
            const isPendingLogin = sessionStorage.getItem('pendingLogin') === 'true';

            if (window.Clerk.user && isRemembered) {
                // Remembered user — go straight in
                enterSystem();
            } else if (window.Clerk.user && isPendingLogin) {
                // Just completed login (back from OAuth) — show remember prompt
                appDiv.style.display = 'none';
                rememberPrompt.style.display = 'block';
            } else if (window.Clerk.user && !isRemembered) {
                // Returning user not remembered — sign out and show login
                await window.Clerk.signOut();
                document.cookie = '__session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
                showSignIn(appDiv);
            } else {
                // Not logged in — show sign-in form
                showSignIn(appDiv);
            }

            // Watch for successful sign-in (email/password, not OAuth)
            window.Clerk.addListener(({ user }) => {
                if (user) {
                    appDiv.style.display = 'none';
                    rememberPrompt.style.display = 'block';
                }
            });
        });

        // Preloader Exit Animation
        window.addEventListener('load', function() {
            setTimeout(function() {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.classList.add('slide-up');
                }
            }, 2200); // Wait for the text to appear and hold briefly before sliding up
        });
    </script>
</body>
</html>
