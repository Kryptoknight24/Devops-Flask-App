version: '3.8'
services:
  web:
    build: .
    environment:
      - CLERK_SECRET_KEY=sk_test_YHrDfdkKdRwcEWxnzZy7dzJ3RbWAHRXMPhrOoDCJNz
    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: myappdb

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # THE FIX Part 1: Swap to sslip.io to bypass the Let's Encrypt ban
    command: caddy reverse-proxy --from 16.112.189.245.sslip.io --to web:5000
    depends_on:
      - web
    # THE FIX Part 2: Give Caddy permanent storage so Jenkins can't delete the certs
    volumes:
      - caddy_data:/data
      - caddy_config:/config

# Declare the permanent storage drives at the bottom
volumes:
  caddy_data:
  caddy_config: