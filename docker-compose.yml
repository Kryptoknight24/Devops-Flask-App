version: '3.8'
services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - CLERK_SECRET_KEY=sk_test_YHrDfdkKdRwcEWxnzZy7dzJ3RbWAHRXMPhrOoDCJNz
    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: myappdb

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # This single line commands Caddy to get an SSL cert for your IP and proxy it to Flask!
    command: caddy reverse-proxy --from 16.112.189.245.nip.io --to web:5000
    depends_on:
      - web